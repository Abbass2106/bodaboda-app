services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: bodaconnect-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf

  bodaconnect:
    build: .
    container_name: bodaconnect-app
    ports:
      - "5000:5000"
    environment:
      - MQTT_BROKER_HOST=mosquitto
      - MQTT_BROKER_PORT=1883
    depends_on:
      - mosquitto
