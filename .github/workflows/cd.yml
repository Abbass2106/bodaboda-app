name: CD

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------
  # Run the same test suite before deploying anything
  # ---------------------------------------------------------
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v

  # ---------------------------------------------------------
  # Build the Docker image and push to GitHub Container Registry
  # Tags: latest + the git commit short SHA (e.g. v-<sha>)
  # ---------------------------------------------------------
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA tag
        id: meta
        run: |
          echo "tag=$(echo ${GITHUB_SHA} | cut -c1-7)" >> "$GITHUB_OUTPUT"
          echo "image=$(echo ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}

  # ---------------------------------------------------------
  # Deploy to STAGING automatically after image is pushed
  # ---------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: staging
      url: http://staging.bodaconnect.local

    steps:
      - name: Deploy to staging server
        run: |
          echo "Deploying image ${{ needs.build-and-push.outputs.image }}:${{ needs.build-and-push.outputs.image_tag }} to STAGING"
          echo "Example real command:"
          echo "ssh user@staging-server 'docker pull ${{ needs.build-and-push.outputs.image }}:latest && docker compose -f docker-compose.staging.yml up -d'"

      - name: Verify staging is running
        run: |
          echo "Checking staging health endpoint..."
          echo "curl -f http://staging-server:5000/api/health"
          echo "Staging deployment verified."

  # ---------------------------------------------------------
  # Manual approval gate - Release Manager must approve
  # This pauses the pipeline until someone approves the
  # 'production' environment in GitHub's Environments settings
  # ---------------------------------------------------------
  approval-gate:
    name: Release Manager Approval
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production-approval

    steps:
      - name: Approval received
        run: echo "Release Manager approved deployment to PRODUCTION."

  # ---------------------------------------------------------
  # Deploy to PRODUCTION after manual approval
  # ---------------------------------------------------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push, approval-gate]
    environment:
      name: production
      url: http://bodaconnect.example.com

    steps:
      - name: Deploy to production server
        run: |
          echo "Deploying image ${{ needs.build-and-push.outputs.image }}:${{ needs.build-and-push.outputs.image_tag }} to PRODUCTION"
          echo "Example real command:"
          echo "ssh user@prod-server 'docker pull ${{ needs.build-and-push.outputs.image }}:latest && docker compose -f docker-compose.prod.yml up -d'"

      - name: Verify production is running
        run: |
          echo "Checking production health endpoint..."
          echo "curl -f http://prod-server:5000/api/health"
          echo "Production deployment verified and system is running."